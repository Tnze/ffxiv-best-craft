name: 'build_web'
on:
    push:
        branches:
            - main
        tags:
            - v*
    workflow_dispatch:

jobs:
    build-web:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: latest
                  cache: pnpm
            - run: corepack enable
            - name: install Rust nightly
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: nightly
                  components: rust-src
            - name: install wasm-pack
              run: npm install -g wasm-pack
            - name: install app dependencies and build it
              run: pnpm i && pnpm run build-web
            # Run type check after the wasm package is built
            - name: run tsc
              run: pnpm tsc --noEmit
            - name: upload files
              uses: actions/upload-artifact@v4
              with:
                  name: bestcraft-dist
                  path: dist/

    deploy-web:
        needs: build-web
        if: startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest
        environment: SSH Deployer
        steps:
            - name: download files
              uses: actions/download-artifact@v4
              with:
                  name: bestcraft-dist
            # Step 1: deploy all assets except index.html, keeping old files
            # This ensures new JS/CSS/images are available before index.html goes live
            - name: ssh deploy (assets first)
              uses: easingthemes/ssh-deploy@v5.1.0
              with:
                  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
                  ARGS: '-rlzvc --exclude=releases --exclude=.htaccess --exclude=.user.ini --exclude=index.html -i'
                  SOURCE: './'
                  REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
                  REMOTE_USER: ${{ secrets.REMOTE_USER }}
                  TARGET: ${{ vars.TARGET }}
            # Step 2: deploy index.html and clean up old files
            # At this point all new assets are already on the server, seamless switch
            - name: ssh deploy (finalize with index.html)
              uses: easingthemes/ssh-deploy@v5.1.0
              with:
                  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
                  ARGS: '-rlzvc --exclude=releases --exclude=.htaccess --exclude=.user.ini --delete --delete-after -i'
                  SOURCE: './'
                  REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
                  REMOTE_USER: ${{ secrets.REMOTE_USER }}
                  TARGET: ${{ vars.TARGET }}
